</div>
<div id="LC22" class="react-code-text react-code-line-contents-no-virtualization react-file-line html-div "><span class="pl-ent">model_auto_train</span>: <span class="pl-c"><span class="pl-c">#</span> this config uses presets for inputs, outputs, etc. To help you learn/experiment. But the source configs will have placeholders for all fields that are basically guaranteed to vary across runs.</span></div>
<div id="LC23" class="react-code-text react-code-line-contents-no-virtualization react-file-line html-div ">  <span class="pl-ent">do_train</span>: <span class="pl-s">True </span><span class="pl-c"><span class="pl-c">#</span> whether or not to actually do an automatic training run at the end, or if you want to manage it yourself</span></div>
<div id="LC24" class="react-code-text react-code-line-contents-no-virtualization react-file-line html-div ">  <span class="pl-ent">runpod_api_key</span>: <span class="pl-s">!!PLACEHOLDER!!</span></div>
<div id="LC25" class="react-code-text react-code-line-contents-no-virtualization react-file-line html-div ">  <span class="pl-ent">huggingface_token</span>: <span class="pl-s">!!PLACEHOLDER!!</span></div>
<div id="LC26" class="react-code-text react-code-line-contents-no-virtualization react-file-line html-div ">  <span class="pl-ent">wandb_api_key</span>: <span class="pl-s">!!PLACEHOLDER!!</span></div>
<div id="LC27" class="react-code-text react-code-line-contents-no-virtualization react-file-line html-div ">  <span class="pl-ent">pod_id</span>: <span class="pl-c"><span class="pl-c">#</span> For taking advantage of a preexisting pod</span></div>
<div id="LC28" class="react-code-text react-code-line-contents-no-virtualization react-file-line html-div "><span class="pl-ent">model_auto_run</span>: <span class="pl-c"><span class="pl-c">#</span> !!ATTENTION!! Augmentoolkit can download and run the model that you just trained, automatically for you. To run it in the future, run either the llm_server or rag_server pipelines, which will start an LLM server on port 8003. The interface has a chat window that listens to this port and lets you converse with your custom model entirely from within Augmentoolkit, entirely locally. NOTE THAT between the original weights of the model, plus the quantized weights, this will take 22 gigabytes of additional disk space for a moment, before going back down to 7 gigabytes -- ensure you have enough room!</span></div>
<div id="LC29" class="react-code-text react-code-line-contents-no-virtualization react-file-line html-div ">  <span class="pl-ent">do_run</span>: <span class="pl-c1">True</span></div>
<div id="LC30" class="react-code-text react-code-line-contents-no-virtualization react-file-line html-div ">  <span class="pl-ent">cache_dir</span>: <span class="pl-s">./cache</span></div>
<div id="LC31" class="react-code-text react-code-line-contents-no-virtualization react-file-line html-div ">  <span class="pl-ent">server_type</span>: <span class="pl-s">normal </span><span class="pl-c"><span class="pl-c">#</span> normal OR rag, only meaningfu lif do_run is on, defaults to normal</span></div>
<div id="LC32" class="react-code-text react-code-line-contents-no-virtualization react-file-line html-div ">
</div>
<div id="LC33" class="react-code-text react-code-line-contents-no-virtualization react-file-line html-div "><span class="pl-ent">path</span>:</div>
<div id="LC34" class="react-code-text react-code-line-contents-no-virtualization react-file-line html-div ">  <span class="pl-ent">input_dirs</span>:</div>
<div id="LC35" class="react-code-text react-code-line-contents-no-virtualization react-file-line html-div ">    - <span class="pl-ent">path</span>: <span class="pl-s">./inputs/examples/facts </span><span class="pl-c"><span class="pl-c">#</span> the external configs use presets for inputs, outputs, etc. To help you learn/experiment. But the source configs will have placeholders for all fields that are basically guaranteed to vary across runs.</span></div>
<div id="LC36" class="react-code-text react-code-line-contents-no-virtualization react-file-line html-div ">      <span class="pl-ent">variation_generation_counts</span>: <span class="pl-c1">4</span> <span class="pl-c"><span class="pl-c">#</span> it is better to go overboard than not have enough data. &quot;If you don&#39;t think you&#39;re laying it on thick, you&#39;re not laying it on thick enough&quot; -- the model can handle it.</span></div>
<div id="LC37" class="react-code-text react-code-line-contents-no-virtualization react-file-line html-div ">      <span class="pl-ent">final_system_prompt_additional_context</span>: <span class="pl-s"><span class="pl-pds">&quot;</span>Think first, then respond.<span class="pl-pds">&quot;</span></span> <span class="pl-c"><span class="pl-c">#</span> can leave blank if you do not want to change the system prompt</span></div>
<div id="LC38" class="react-code-text react-code-line-contents-no-virtualization react-file-line html-div ">      <span class="pl-ent">factual_gen_subset_size_per_way</span>: <span class="pl-c1">2000</span></div>
<div id="LC39" class="react-code-text react-code-line-contents-no-virtualization react-file-line html-div ">      <span class="pl-ent">factual_gen_use_subset</span>: <span class="pl-c1">False</span></div>
<div id="LC40" class="react-code-text react-code-line-contents-no-virtualization react-file-line html-div ">      <span class="pl-ent">rag_subset_size</span>: <span class="pl-c1">1500</span></div>
<div id="LC41" class="react-code-text react-code-line-contents-no-virtualization react-file-line html-div ">      <span class="pl-ent">rag_use_subset</span>: <span class="pl-c1">True</span></div>
<div id="LC42" class="react-code-text react-code-line-contents-no-virtualization react-file-line html-div ">      <span class="pl-ent">correction_subset_size</span>: <span class="pl-c1">1500</span></div>
<div id="LC43" class="react-code-text react-code-line-contents-no-virtualization react-file-line html-div ">      <span class="pl-ent">correction_use_subset</span>: <span class="pl-c1">True</span></div>
<div id="LC44" class="react-code-text react-code-line-contents-no-virtualization react-file-line html-div ">  <span class="pl-ent">output_dir</span>: <span class="pl-s">./outputs/my_first_dataset</span></div>
<div id="LC45" class="react-code-text react-code-line-contents-no-virtualization react-file-line html-div ">  <span class="pl-ent">models_dir</span>: <span class="pl-s">./models/ </span><span class="pl-c"><span class="pl-c">#</span> Only used if do_train and do_run are on.</span></div>
<div id="LC46" class="react-code-text react-code-line-contents-no-virtualization react-file-line html-div ">  <span class="pl-ent">huggingface_cache_dir</span>: <span class="pl-s">./cache/huggingface</span></div>
<div id="LC47" class="react-code-text react-code-line-contents-no-virtualization react-file-line html-div "><span class="pl-ent">system</span>:</div>
<div id="LC48" class="react-code-text react-code-line-contents-no-virtualization react-file-line html-div ">  <span class="pl-ent">number_of_factual_sft_generations_to_do</span>: <span class="pl-c1">2</span></div>
<div id="LC49" class="react-code-text react-code-line-contents-no-virtualization react-file-line html-div ">  <span class="pl-ent">completion_mode</span>: <span class="pl-c1">False</span></div>
<div id="LC50" class="react-code-text react-code-line-contents-no-virtualization react-file-line html-div ">  <span class="pl-ent">remove_system_prompt_ratio</span>: <span class="pl-c1">0.2</span> <span class="pl-c"><span class="pl-c">#</span> remove the system prompts from this % of the final domain data. Helps generalization.</span></div>
<div id="LC51" class="react-code-text react-code-line-contents-no-virtualization react-file-line html-div ">  <span class="pl-ent">remove_thought_process_ratio</span>: <span class="pl-c1">0.2</span> <span class="pl-c"><span class="pl-c">#</span> remove the thought process from this % of the final domain data. Helps generalization.</span></div>
<div id="LC52" class="react-code-text react-code-line-contents-no-virtualization react-file-line html-div ">  <span class="pl-ent">remove_thought_process_prompt</span>: <span class="pl-s">Do not write out your thoughts first; answer immediately.</span></div>
<div id="LC53" class="react-code-text react-code-line-contents-no-virtualization react-file-line html-div ">  <span class="pl-ent">final_answer_str</span>: <span class="pl-s"><span class="pl-pds">&quot;</span>Answer:<span class="pl-pds">&quot;</span></span> <span class="pl-c"><span class="pl-c">#</span> Basically, whatever your &lt;/think&gt; string is. Used alongside remove thought process ratio.</span></div>
<div id="LC54" class="react-code-text react-code-line-contents-no-virtualization react-file-line html-div ">  <span class="pl-ent">generic_thought_process_on_domain_data</span>: <span class="pl-s">True </span><span class="pl-c"><span class="pl-c">#</span> whether to make the domains-specific data use similar thought process structure as the generic data. May improve performance and generalization but requires source citing to be on if you want filenames in answers that you can reference. Also adds an extra LLM computation step. NOTE/QUESTION to me -- should this be a step inside the factual pipeline, or the complete pipeline?</span></div>
<div id="LC55" class="react-code-text react-code-line-contents-no-virtualization react-file-line html-div ">  <span class="pl-ent">cite_sources_at_end</span>: <span class="pl-s">True </span><span class="pl-c"><span class="pl-c">#</span> Whether the sources used to produce an answer are appended to the end of each domain-specific AI answer. (NOTE this will have to be used in the generic thoughts pipeline.</span></div>
<div id="LC56" class="react-code-text react-code-line-contents-no-virtualization react-file-line html-div ">  <span class="pl-ent">concurrency_limit</span>: <span class="pl-c1">50</span> <span class="pl-c"><span class="pl-c">#</span> !!ATTENTION!! Adjust this up or down based on your hardware. This setting is the **most important** for speed, overall. 10 is a low value meant for something like an older Mac laptop. If you have a GPU with decent VRAM, crank this a bit higher. If you&#39;re industrial scale, pump this extremely high. If you don&#39;t want to wait, use the API config, _START_HERE..., instead (it is still very cheap). </span></div>
<div id="LC57" class="react-code-text react-code-line-contents-no-virtualization react-file-line html-div ">  <span class="pl-c"><span class="pl-c">#</span> Local inference is for these groups: industrial level applications of Augmentoolkit wanting datagen at serious scales using the custom model; ML Hobbyists or researchers who feel existential anxiety when they have a GPU that is idling; people who don&#39;t want to spend any money at all (well, you&#39;ll still have to spend some to train, more than the datagen, but it&#39;s not much); people who want to use a very specific model for their dataset generation but this model is not offered by any API; and people who don&#39;t want to send any data to someone&#39;s cloud. Just, if you do use only local inference and you only have a laptop, expect it to take like a week maybe? Dataset generation is parallelizable though so you can split with a friend, just cut the `number_of_factual_sft_generations_to_do` in half between you, and also cut `variation_generation_counts`</span></div>
<div id="LC58" class="react-code-text react-code-line-contents-no-virtualization react-file-line html-div ">  <span class="pl-ent">use_stop</span>: <span class="pl-c1">True</span></div>
<div id="LC59" class="react-code-text react-code-line-contents-no-virtualization react-file-line html-div ">  <span class="pl-ent">subset_size</span>: <span class="pl-c1">30</span></div>
<div id="LC60" class="react-code-text react-code-line-contents-no-virtualization react-file-line html-div ">  <span class="pl-ent">use_subset</span>: <span class="pl-c1">False</span></div>
<div id="LC61" class="react-code-text react-code-line-contents-no-virtualization react-file-line html-div ">  <span class="pl-ent">chunk_size</span>: <span class="pl-c1">4000</span></div>
<div id="LC62" class="react-code-text react-code-line-contents-no-virtualization react-file-line html-div ">  <span class="pl-ent">what_percent_of_sft_is_pretrain</span>: <span class="pl-c"><span class="pl-c">#</span> use either this or num_tokens_pretrain_in_sft. The latter sets it directly, this one sets it relative to the number of SFT tokens.</span></div>
