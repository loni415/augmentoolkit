<div id="LC3" class="react-code-text react-code-line-contents-no-virtualization react-file-line html-div "><span class="pl-c"><span class="pl-c">#</span> !!ATTENTION!! To set up llama.cpp and the custom datagen model, run `bash local_macos.sh` or `bash local_linux.sh` depending on your OS</span></div>
