pipeline: repvar-pipeline

api:
  small_api_key: ollama
  large_api_key: ollama
  small_base_url: http://127.0.0.1:11434/v1
  large_base_url: http://127.0.0.1:11434/v1 
  small_model: augmentoolkit
  large_model: augmentoolkit
  small_mode: api
  large_mode: api
path:
  input_dir: ./inputs/strategic_culture
  output_dir: ./outputs/4sep-repvar
  prompts: ./prompts_local
  prompts_inferred: ./prompts_inferred_facts
  default_prompts_inferred: ./prompts_inferred_facts_local
  default_prompts: ./prompts_local
system:
  completion_mode: False
  concurrency_limit: 1
  use_stop: True
  subset_size: 5
  use_min_p: False
  use_subset: True 
  chunk_size: 4000
  keep_system_prompt: True
  variation_generator_count: 4 
  make_inferred_facts: True
dataset:
  dataset_context: China policy decision making and strategic culture
  include_context_in_dataset: True
  code_variation_functions: ["keyboard_augmentation"] 
  additional_dataset_context: "" 
meta_datagen:
  do_meta_datagen: True
  meta_datagen_keys:
    - judgement_details
    - atomic_facts_details
    - variations_details
  meta_datagen_extras:
cost:
  cost_per_million_small_input: 0.07
  cost_per_million_small_output: 0.14
  cost_per_million_large_input: 0.23
  cost_per_million_large_output: 0.40